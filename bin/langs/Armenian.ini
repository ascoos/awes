[about]

[welcome]
Title="ASCOOS Web Extended Studio"
Row1="Բարի գալուստ ծրագրին, որը ստեղծված է օգնելու համար խնայել արժեքավոր ժամանակ և ջանք։"
Row2="Այժմ կարող եք կենտրոնանալ սկզբնաղբյուր կոդի գրության և նրա փորձարկման վրա տարբեր PHP տարբերակների և տվյալների բազաների վրա։"
Row3="ASCOOS Web Extended Studio, շարժական վեբ սերվեր, ներառում է բազմաթիվ բաղադրիչներ, հնարավորություններ և հավելվածներ (դեսքթոփ և վեբ), որոնք ապահովում են վեբ ծրագրավորողների համար անհրաժեշտ backend աջակցման լուծումներ։"
Row4="Մաղթում ենք հաջողություն ձեր սկզբնաղբյուր կոդի գրությանը։"

