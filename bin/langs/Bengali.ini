[about]

[welcome]
Title="ASCOOS Web Extended Studio"
Row1="মূল্যবান সময় এবং প্রচেষ্টা সঞ্চয় করতে আপনাকে সহায়তা করার জন্য তৈরি করা প্রোগ্রামে আপনাকে স্বাগতম।"
Row2="এখন আপনি সোর্স কোড লেখার জন্য নিজেকে উৎসর্গ করতে পারেন এবং এটি PHP এবং ডেটাবেসের বিভিন্ন সংস্করণে পরীক্ষা করতে পারেন।"
Row3="ASCOOS Web Extended Studio, একটি পোর্টেবল ওয়েব সার্ভার, এর মধ্যে বহু উপাদান, বৈশিষ্ট্য এবং অ্যাপ্লিকেশন (ডেস্কটপ এবং ওয়েব) রয়েছে যা তাত্ক্ষণিকভাবে ওয়েব ডেভেলপারদের ব্যাক-এন্ড সহায়তা সমাধানগুলি সরবরাহ করবে যা এতই প্রয়োজন।"
Row4="আমরা আপনাকে ভাল সোর্স কোডের জন্য শুভেচ্ছা জানাই।"

