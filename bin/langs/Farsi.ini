[about]

[welcome]
Title="ASCOOS Web Extended Studio"
Row1="به برنامه‌ای خوش آمدید که برای صرفه‌جویی در وقت و تلاش ارزشمند شما طراحی شده است."
Row2="اکنون می‌توانید به نوشتن کد منبع و آزمایش آن در نسخه‌های مختلف PHP و پایگاه‌های داده بپردازید."
Row3="ASCOOS Web Extended Studio، یک سرور وب قابل حمل، دارای اجزا، ویژگی‌ها و برنامه‌های غنی (دسکتاپ و وب) است که فوراً راه‌حل‌های پشتیبانی پشت‌صحنه مورد نیاز توسعه‌دهندگان وب را برای شما فراهم می‌کند."
Row4="برای شما کدهای منبع خوب آرزو می‌کنیم."

