[welcome]
Title="ASCOOS Web Extended Studio"
Row1="مرحبًا بكم في البرنامج الذي تم إنشاؤه لمساعدتكم في توفير الوقت والجهد الثمين."
Row2="الآن يمكنكم تكريس أنفسكم لكتابة الكود المصدري واختباره على إصدارات مختلفة من PHP وقواعد البيانات."
Row3="ASCOOS Web Extended Studio، خادم الويب المحمول، يحتوي على ثروة من المكونات والميزات والتطبيقات (سطح المكتب والويب) التي ستوفر لكم على الفور حلول الدعم الخلفي التي يحتاجها مطورو الويب بشدة."
