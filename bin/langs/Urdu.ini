[about]

[welcome]
Title="ASCOOS ویب ایکسٹینڈڈ اسٹوڈیو"
Row1="اس پروگرام میں خوش آمدید جو آپ کو قیمتی وقت اور محنت بچانے میں مدد دیتا ہے۔"
Row2="اب آپ سورس کوڈ لکھنے اور اسے مختلف پی ایچ پی ورژنز اور ڈیٹا بیسز پر ٹیسٹ کرنے پر توجہ دے سکتے ہیں۔"
Row3="ASCOOS ویب ایکسٹینڈڈ اسٹوڈیو، ایک پورٹ ایبل ویب سرور، میں اجزاء، خصوصیات، اور ایپلیکیشنز (ڈیسک ٹاپ اور ویب) کا خزانہ ہے جو ویب ڈویلپرز کو فوری طور پر بیک اینڈ سپورٹ حل فراہم کرتا ہے۔"
Row4="ہم آپ کے لیے اچھے سورس کوڈز کی خواہش کرتے ہیں۔"

